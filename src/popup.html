<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>PinIG Downloader</title>
    <link rel="stylesheet" href="popup.css">
  </head>
  <body>
    <main>
      <div class="brand">
        <img src="../assets/logo.png" alt="">
        <h1>PinIG Downloader</h1>
      </div>
      <p>Open Instagram or Pinterest, then use the floating panel on the page.</p>
      <div class="tips">
        <span>Single media: hover and click ↓</span>
        <span>Bulk: choose all, photos, or videos</span>
      </div>
      <button id="scan">Scan current tab</button>
      <p id="status"></p>
    </main>
    <script src="popup.js"></script>
  </body>
</html>
